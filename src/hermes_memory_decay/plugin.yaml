name: hermes-memory-decay
version: "0.1.0"
description: >
  Human-like memory with natural decay. Stores memories that strengthen
  on recall and fade over time, powered by the memory-decay engine.
author: roach
manifest_version: 1

requires_env: [GEMINI_API_KEY]

provides_tools:
  - memory_search
  - memory_store
  - memory_store_batch
  - memory_forget
  - memory_status

provides_hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call
